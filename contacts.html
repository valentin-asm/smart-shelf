<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Контакти — SmartShelf</title>
</head>
<body>
    <header>
        <h1>SmartShelf</h1>
        <nav aria-label="Основна навігація">
            <ul>
                <li><a href="index.html">Головна</a></li>
                <li><a href="topic.html">Про проєкт</a></li>
                <li><a href="contacts.html" aria-current="page">Контакти</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Зворотний зв'язок</h2>
        <form method="post">
            <label for="name">Ім'я:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Ел. пошта:</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Телефон:</label>
            <input type="tel" id="phone" name="phone" pattern="\+380[0-9]{9}" title="Формат: +380XXXXXXXXX" aria-describedby="phone-hint">
            <small id="phone-hint">Формат: +380XXXXXXXXX</small>

            <label for="message">Повідомлення:</label>
            <textarea id="message" name="message" minlength="10" required></textarea>

            <button type="submit">Надіслати</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 SmartShelf</p>
        <nav aria-label="Навігація в підвалі">
            <ul>
                <li><a href="index.html">Головна</a></li>
                <li><a href="contacts.html">Контакти</a></li>
            </ul>
        </nav>
    </footer>
</body>
</html>
